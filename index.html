<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reno Heller</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #888;
    --accent: #2d6a4f;
    --danger: #c0392b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  header h1 { font-size: 16px; font-weight: 600; }
  header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .overall-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .overall-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }

  .toolbar { display: flex; gap: 6px; padding: 8px 12px; background: var(--card); border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
  .toolbar-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-right: 2px; }
  .drag-name { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
  .drag-name:active { cursor: grabbing; }
  .toolbar-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .add-btn { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px dashed var(--border); background: none; cursor: pointer; color: var(--accent); transition: all .15s; }
  .add-btn:hover { border-color: var(--accent); background: rgba(45,106,79,.05); }

  /* Week grid */
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; min-height: calc(100vh - 130px); }
  .day-col { border-right: 1px solid var(--border); padding: 0; display: flex; flex-direction: column; min-width: 0; }
  .day-col:last-child { border-right: none; }
  .day-col-header { padding: 10px 8px 6px; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 5; }
  .day-col-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .day-col-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .day-col-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .day-col-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
  .day-col-body { flex: 1; padding: 4px; overflow-y: auto; min-height: 60px; }
  .day-col.drag-over .day-col-body { background: rgba(45,106,79,.05); }

  /* Task cards */
  .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 8px; margin-bottom: 4px; cursor: grab; user-select: none; -webkit-user-select: none; transition: box-shadow .15s, opacity .15s; }
  .task-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .task-card:active { cursor: grabbing; }
  .task-card.done { opacity: .4; }
  .task-card.dragging { opacity: .2; }
  .task-card.completing { animation: pop .4s ease; }
  @keyframes pop { 0%{transform:scale(1)} 35%{transform:scale(1.04);background:#f0fff4} 70%{transform:scale(.98)} 100%{transform:scale(1)} }

  .task-card-row { display: flex; align-items: flex-start; gap: 5px; }
  .task-check { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .2s; padding: 0; }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check svg { width: 8px; height: 8px; fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; display: none; }
  .task-check.checked svg { display: block; }
  .task-card-content { flex: 1; min-width: 0; }
  .task-card-text { font-size: 11px; line-height: 1.3; word-break: break-word; }
  .task-card.done .task-card-text { text-decoration: line-through; color: var(--muted); }
  .task-card-footer { display: flex; align-items: center; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
  .task-time { font-size: 9px; color: var(--muted); font-weight: 500; background: var(--bg); padding: 1px 5px; border-radius: 4px; font-variant-numeric: tabular-nums; }
  .task-pill { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 20px; }
  .task-actions { margin-left: auto; display: flex; gap: 1px; flex-shrink: 0; }
  .task-actions button { background: none; border: none; cursor: pointer; padding: 1px 3px; color: var(--border); font-size: 12px; transition: color .15s; }
  .task-actions button:hover { color: var(--accent); }
  .task-actions .del-btn:hover { color: var(--danger); }

  .day-empty { text-align: center; padding: 20px 4px; color: var(--border); font-size: 11px; }

  /* Add/Edit modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius); padding: 18px; width: 92%; max-width: 380px; }
  .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .modal label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 3px; margin-top: 10px; }
  .modal input, .modal select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal .row2 { display: flex; gap: 8px; }
  .modal .row2 > div { flex: 1; }
  .modal .who-toggles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .modal .who-toggle { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 2px solid var(--border); background: none; cursor: pointer; transition: all .15s; }
  .modal .who-toggle.on { border-color: currentColor; }
  .modal .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal .modal-actions button { flex: 1; border: none; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-save:hover, .btn-cancel:hover { opacity: .85; }

  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; border-radius: 2px; animation: cffall 1.3s ease-in forwards; }
  @keyframes cffall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(540deg);opacity:0} }

  /* Mobile: horizontal scroll */
  @media (max-width: 768px) {
    .week { grid-template-columns: repeat(7, minmax(130px, 1fr)); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .week::-webkit-scrollbar { display: none; }
    .day-col-header { padding: 8px 6px 5px; }
    .task-card { padding: 6px 6px; }
    .task-card-text { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="confetti-wrap" id="confetti"></div>

<header>
  <div class="header-top">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
    <div><h1>Renovierung Heller</h1><p id="progress-text">Wird geladen...</p></div>
  </div>
  <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Ziehen:</span>
  <span class="drag-name" draggable="true" data-name="Jonas" style="background:#dbeafe;color:#1d4ed8">Jonas</span>
  <span class="drag-name" draggable="true" data-name="Ralf" style="background:#dcfce7;color:#166534">Ralf</span>
  <span class="drag-name" draggable="true" data-name="Marlies" style="background:#fef9c3;color:#854d0e">Marlies</span>
  <span class="drag-name" draggable="true" data-name="Lili" style="background:#ede9fe;color:#5b21b6">Lili</span>
  <span class="toolbar-sep"></span>
  <button class="add-btn" onclick="openAdd()">+ Aufgabe</button>
  <button class="add-btn" onclick="openKinder()">+ Kinder</button>
</div>

<div class="week" id="week"></div>

<!-- Add modal -->
<div class="modal-overlay" id="add-overlay" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <h3 id="modal-title">Aufgabe hinzufügen</h3>
    <label>Aufgabe</label>
    <input type="text" id="m-text" placeholder="Neue Aufgabe..." maxlength="120">
    <label>Tag</label>
    <select id="m-day"></select>
    <div class="row2">
      <div><label>Uhrzeit</label><select id="m-hour"></select></div>
      <div><label>Dauer</label><select id="m-dur"></select></div>
    </div>
    <label>Wer</label>
    <div class="who-toggles" id="m-who"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdd()">Abbrechen</button>
      <button class="btn-save" onclick="saveModal()">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://mixaxkywkojoclgbjjur.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peGF4a3l3a29qb2NsZ2JqanVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MTA5ODEsImV4cCI6MjA4MjQ4Njk4MX0._rvGSaVi4VERdWbA-Z229rhe4KyJH2FU5pHqLkYjtc4';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const DAY_SHORT = { Montag:'Mo', Dienstag:'Di', Mittwoch:'Mi', Donnerstag:'Do', Freitag:'Fr', Samstag:'Sa', Sonntag:'So' };
const NAMES = ['Jonas','Ralf','Marlies','Lili'];
const WHO_COLORS = {
  Jonas:   { bg: '#dbeafe', color: '#1d4ed8' },
  Ralf:    { bg: '#dcfce7', color: '#166534' },
  Marlies: { bg: '#fef9c3', color: '#854d0e' },
  Lili:    { bg: '#ede9fe', color: '#5b21b6' },
  Alle:    { bg: '#fce7f3', color: '#9d174d' }
};
const WEEKDAY_EVENING = ['Montag','Dienstag','Mittwoch','Donnerstag'];
function dayHours(day) {
  if (WEEKDAY_EVENING.includes(day)) return { start: 18, end: 21 };
  return { start: 7, end: 21 };
}

let todos = [];
let modalMode = null; // 'add' | 'edit' | 'kinder'
let editId = null;

// Populate modal selects
const mDay = document.getElementById('m-day');
DAYS.forEach(d => { mDay.innerHTML += `<option>${d}</option>`; });
const mHour = document.getElementById('m-hour');
const mDur = document.getElementById('m-dur');
function updateModalHours() {
  const { start, end } = dayHours(mDay.value);
  const curH = parseInt(mHour.value) || start;
  const curD = parseInt(mDur.value) || 1;
  mHour.innerHTML = '';
  for (let h = start; h < end; h++) {
    mHour.innerHTML += `<option value="${h}"${h === Math.max(start, Math.min(end-1, curH)) ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`;
  }
  mDur.innerHTML = '';
  for (let d = 1; d <= (end - start); d++) {
    mDur.innerHTML += `<option value="${d}"${d === Math.min(curD, end-start) ? ' selected' : ''}>${d}h</option>`;
  }
}
mDay.addEventListener('change', updateModalHours);
updateModalHours();

// Modal who toggles
const mWho = document.getElementById('m-who');
mWho.innerHTML = NAMES.map(n => {
  const wc = WHO_COLORS[n];
  return `<button type="button" class="who-toggle" data-name="${n}" style="color:${wc.color}" onclick="toggleWho(this,'${n}')">${n}</button>`;
}).join('');

async function loadTodos() {
  const { data, error } = await sb.from('reno_todos').select('*').order('start_hour').order('created_at');
  if (error) { document.getElementById('week').innerHTML = `<div style="padding:20px;color:var(--danger)">${esc(error.message)}</div>`; return; }
  todos = data || [];
  render();
}
loadTodos();

sb.channel('reno_todos_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'reno_todos' }, () => { loadTodos(); })
  .subscribe();

function render() {
  const allDone = todos.filter(t => t.done).length;
  const pct = todos.length ? Math.round(allDone / todos.length * 100) : 0;
  document.getElementById('progress-text').textContent = `${allDone} von ${todos.length} erledigt (${pct}%)`;
  document.getElementById('overall-fill').style.width = pct + '%';

  const week = document.getElementById('week');
  let html = '';

  DAYS.forEach(day => {
    const items = todos.filter(t => t.day === day);
    const done = items.filter(t => t.done).length;
    const dayPct = items.length ? Math.round(done / items.length * 100) : 0;
    const { start: hStart, end: hEnd } = dayHours(day);
    const timeNote = WEEKDAY_EVENING.includes(day) ? 'Abend' : 'Ganztag';

    html += `<div class="day-col" data-day="${day}">
      <div class="day-col-header">
        <div class="day-col-name">${DAY_SHORT[day]}</div>
        <div class="day-col-sub">${timeNote} · ${done}/${items.length}</div>
        <div class="day-col-bar"><div class="day-col-bar-fill" style="width:${dayPct}%"></div></div>
      </div>
      <div class="day-col-body" data-day="${day}">`;

    if (!items.length) {
      html += '<div class="day-empty">—</div>';
    } else {
      items.forEach(t => {
        const sh = t.start_hour ?? hStart;
        const dur = t.duration ?? 1;
        const endH = Math.min(sh + dur, hEnd);
        const time = `${String(sh).padStart(2,'0')}–${String(endH).padStart(2,'0')}`;
        const people = t.who.split(',').map(s => s.trim()).filter(Boolean);
        const firstWc = WHO_COLORS[people[0]] || WHO_COLORS.Jonas;
        const pills = people.map(p => {
          const c = WHO_COLORS[p] || { bg:'#eee', color:'#555' };
          return `<span class="task-pill" style="background:${c.bg};color:${c.color}">${p}</span>`;
        }).join('');

        html += `<div class="task-card${t.done ? ' done' : ''}" id="item-${t.id}" data-id="${t.id}" draggable="true"
          style="border-left: 3px solid ${firstWc.color}">
          <div class="task-card-row">
            <button class="task-check${t.done ? ' checked' : ''}" onclick="event.stopPropagation();toggle('${t.id}',${t.done})">
              <svg viewBox="0 0 10 10"><polyline points="1,5.5 3.8,8.5 9,1.5"/></svg>
            </button>
            <div class="task-card-content">
              <div class="task-card-text">${esc(t.text)}</div>
              <div class="task-card-footer">
                <span class="task-time">${time}</span>
                ${pills}
                <span class="task-actions">
                  <button onclick="event.stopPropagation();openEdit('${t.id}')" title="Bearbeiten">✎</button>
                  <button class="del-btn" onclick="event.stopPropagation();delTodo('${t.id}')" title="Löschen">×</button>
                </span>
              </div>
            </div>
          </div>
        </div>`;
      });
    }
    html += '</div></div>';
  });

  week.innerHTML = html;
  setupDragDrop();
}

// --- CRUD ---
window.toggle = async function(id, wasDone) {
  if (!wasDone) {
    const el = document.getElementById('item-' + id);
    if (el) { el.classList.add('completing'); setTimeout(() => el.classList.remove('completing'), 500); }
    confetti();
  }
  await sb.from('reno_todos').update({ done: !wasDone }).eq('id', id);
  await loadTodos();
};

window.delTodo = async function(id) {
  if (!confirm('Aufgabe löschen?')) return;
  await sb.from('reno_todos').delete().eq('id', id);
  await loadTodos();
};

// --- Modal ---
window.openAdd = function(presetDay) {
  modalMode = 'add';
  editId = null;
  document.getElementById('modal-title').textContent = 'Aufgabe hinzufügen';
  document.getElementById('m-text').value = '';
  document.getElementById('m-text').style.display = '';
  mDay.value = presetDay || 'Montag';
  updateModalHours();
  resetWhoToggles([]);
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('m-text').focus();
};

window.openKinder = function() {
  modalMode = 'kinder';
  editId = null;
  document.getElementById('modal-title').textContent = 'Kinder betreuen';
  document.getElementById('m-text').style.display = 'none';
  mDay.value = 'Montag';
  updateModalHours();
  const { start, end } = dayHours('Montag');
  mHour.value = start;
  mDur.value = end - start;
  resetWhoToggles(['Lili']);
  document.getElementById('add-overlay').classList.add('open');
};

window.openEdit = function(id) {
  modalMode = 'edit';
  editId = id;
  const t = todos.find(x => x.id == id);
  if (!t) return;
  document.getElementById('modal-title').textContent = 'Aufgabe bearbeiten';
  document.getElementById('m-text').value = t.text;
  document.getElementById('m-text').style.display = '';
  mDay.value = t.day;
  updateModalHours();
  mHour.value = t.start_hour ?? dayHours(t.day).start;
  mDur.value = t.duration ?? 1;
  const people = t.who.split(',').map(s => s.trim()).filter(Boolean);
  resetWhoToggles(people);
  document.getElementById('add-overlay').classList.add('open');
};

window.closeAdd = function() {
  document.getElementById('add-overlay').classList.remove('open');
  modalMode = null;
  editId = null;
};

window.toggleWho = function(btn, name) {
  btn.classList.toggle('on');
  const wc = WHO_COLORS[name];
  if (btn.classList.contains('on')) {
    btn.style.background = wc.bg; btn.style.borderColor = wc.color;
  } else {
    btn.style.background = 'none'; btn.style.borderColor = '';
  }
};

function resetWhoToggles(selected) {
  mWho.querySelectorAll('.who-toggle').forEach(btn => {
    const name = btn.dataset.name;
    const wc = WHO_COLORS[name];
    if (selected.includes(name)) {
      btn.classList.add('on');
      btn.style.background = wc.bg; btn.style.borderColor = wc.color;
    } else {
      btn.classList.remove('on');
      btn.style.background = 'none'; btn.style.borderColor = '';
    }
  });
}

window.saveModal = async function() {
  const selected = [...mWho.querySelectorAll('.who-toggle.on')].map(b => b.dataset.name);
  if (!selected.length) return;
  const day = mDay.value;
  const start_hour = parseInt(mHour.value);
  const duration = parseInt(mDur.value);
  const who = selected.join(',');

  if (modalMode === 'kinder') {
    await sb.from('reno_todos').insert({ text: 'Kinder betreuen', day, who, done: false, start_hour, duration, created_at: Date.now() });
  } else if (modalMode === 'add') {
    const text = document.getElementById('m-text').value.trim();
    if (!text) return;
    await sb.from('reno_todos').insert({ text, day, who, done: false, start_hour, duration, created_at: Date.now() });
  } else if (modalMode === 'edit' && editId) {
    const text = document.getElementById('m-text').value.trim();
    if (!text) return;
    await sb.from('reno_todos').update({ text, day, who, start_hour, duration }).eq('id', editId);
  }
  closeAdd();
  await loadTodos();
};

document.getElementById('m-text').addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });

// --- Drag & Drop ---
function setupDragDrop() {
  // Task cards
  document.querySelectorAll('.task-card[draggable="true"]').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/drag-task', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });

  // Day columns accept task drops
  document.querySelectorAll('.day-col-body').forEach(body => {
    const col = body.closest('.day-col');
    body.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('text/drag-task') || e.dataTransfer.types.includes('text/drag-name')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = e.dataTransfer.types.includes('text/drag-name') ? 'copy' : 'move';
        col.classList.add('drag-over');
      }
    });
    body.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    body.addEventListener('drop', async e => {
      col.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/drag-task');
      if (taskId) {
        e.preventDefault();
        const targetDay = body.dataset.day;
        const todo = todos.find(t => t.id == taskId);
        if (!todo || todo.day === targetDay) return;
        const { start, end } = dayHours(targetDay);
        const newStart = Math.max(start, Math.min(end - 1, todo.start_hour ?? start));
        const newDur = Math.min(todo.duration ?? 1, end - newStart);
        await sb.from('reno_todos').update({ day: targetDay, start_hour: newStart, duration: newDur }).eq('id', taskId);
        await loadTodos();
      }
    });
  });

  // Task cards accept name drops
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('text/drag-name')) {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'copy';
        card.style.boxShadow = '0 0 0 2px var(--accent)';
      }
    });
    card.addEventListener('dragleave', () => { card.style.boxShadow = ''; });
    card.addEventListener('drop', async e => {
      card.style.boxShadow = '';
      const name = e.dataTransfer.getData('text/drag-name');
      if (!name) return;
      e.preventDefault();
      e.stopPropagation();
      await assignName(card.dataset.id, name);
    });
  });

  // Name pills dragstart
  document.querySelectorAll('.drag-name').forEach(pill => {
    pill.ondragstart = e => {
      e.dataTransfer.setData('text/drag-name', pill.dataset.name);
      e.dataTransfer.effectAllowed = 'copy';
    };
  });

  // Touch: drag tasks between columns
  document.querySelectorAll('.task-card[draggable="true"]').forEach(card => {
    let clone = null, dragging = false, sx = 0, sy = 0;
    card.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; dragging = false;
    }, { passive: true });
    card.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (!dragging && (Math.abs(t.clientX - sx) > 10 || Math.abs(t.clientY - sy) > 10)) {
        dragging = true;
        clone = document.createElement('div');
        clone.textContent = card.querySelector('.task-card-text').textContent.substring(0, 20) + '…';
        clone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:5px 10px;font-size:11px;opacity:.9;max-width:150px;';
        document.body.appendChild(clone);
        card.classList.add('dragging');
      }
      if (!dragging) return;
      e.preventDefault();
      clone.style.left = (t.clientX - 25) + 'px';
      clone.style.top = (t.clientY - 15) + 'px';
      document.querySelectorAll('.day-col.drag-over').forEach(c => c.classList.remove('drag-over'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const col = target?.closest?.('.day-col');
      if (col) col.classList.add('drag-over');
    }, { passive: false });
    card.addEventListener('touchend', async e => {
      if (!dragging) return;
      card.classList.remove('dragging');
      if (clone) { clone.remove(); clone = null; }
      document.querySelectorAll('.day-col.drag-over').forEach(c => c.classList.remove('drag-over'));
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const col = target?.closest?.('.day-col');
      if (col) {
        const targetDay = col.dataset.day;
        const todo = todos.find(td => td.id == card.dataset.id);
        if (todo && todo.day !== targetDay) {
          const { start, end } = dayHours(targetDay);
          const newStart = Math.max(start, Math.min(end - 1, todo.start_hour ?? start));
          const newDur = Math.min(todo.duration ?? 1, end - newStart);
          await sb.from('reno_todos').update({ day: targetDay, start_hour: newStart, duration: newDur }).eq('id', todo.id);
          await loadTodos();
        }
      }
      dragging = false;
    });
  });

  // Touch: drag names onto cards
  document.querySelectorAll('.drag-name').forEach(pill => {
    let clone = null;
    pill.addEventListener('touchstart', e => {
      const t = e.touches[0];
      clone = pill.cloneNode(true);
      clone.style.cssText = `position:fixed;z-index:999;pointer-events:none;opacity:.85;left:${t.clientX-15}px;top:${t.clientY-15}px;`;
      document.body.appendChild(clone);
      pill._dragName = pill.dataset.name;
    }, { passive: true });
    pill.addEventListener('touchmove', e => {
      if (!clone) return;
      e.preventDefault();
      const t = e.touches[0];
      clone.style.left = (t.clientX - 15) + 'px';
      clone.style.top = (t.clientY - 15) + 'px';
      document.querySelectorAll('.task-card').forEach(c => c.style.boxShadow = '');
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const c = target?.closest?.('.task-card');
      if (c) c.style.boxShadow = '0 0 0 2px var(--accent)';
    }, { passive: false });
    pill.addEventListener('touchend', e => {
      if (clone) { clone.remove(); clone = null; }
      document.querySelectorAll('.task-card').forEach(c => c.style.boxShadow = '');
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const c = target?.closest?.('.task-card');
      if (c) assignName(c.dataset.id, pill._dragName);
    });
  });
}

async function assignName(id, name) {
  const todo = todos.find(t => t.id == id);
  if (!todo) return;
  const people = todo.who.split(',').map(s => s.trim()).filter(Boolean);
  if (people.includes(name)) return;
  people.push(name);
  await sb.from('reno_todos').update({ who: people.join(',') }).eq('id', id);
  await loadTodos();
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function confetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#2d6a4f', '#52b788', '#d8f3dc', '#f4a261', '#e76f51', '#7c3aed'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const s = 6 + Math.random() * 7;
    el.style.cssText = `left:${Math.random() * 100}%;top:-10px;background:${colors[Math.floor(Math.random() * colors.length)]};width:${s}px;height:${s}px;animation-delay:${Math.random() * .4}s;animation-duration:${.9 + Math.random() * .7}s;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}
</script>
