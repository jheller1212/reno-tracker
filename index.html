<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reno Heller</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #888;
    --accent: #2d6a4f;
    --danger: #c0392b;
    --radius: 12px;
    --hour-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 20; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .logo { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .overall-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .overall-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }

  .drag-bar { display: flex; gap: 6px; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); align-items: center; position: sticky; top: 76px; z-index: 15; }
  .drag-bar-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; }
  .drag-name { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
  .drag-name:active { cursor: grabbing; }

  .container { max-width: 720px; margin: 0 auto; padding: 16px 16px 80px; }

  .quick-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .quick-form h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
  .form-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .form-row input, .form-row select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 9px; font-size: 12px; color: var(--text); background: var(--bg); outline: none; }
  .form-row input { flex: 1; min-width: 140px; font-size: 13px; padding: 8px 11px; }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .who-toggles { display: flex; gap: 4px; flex-wrap: wrap; }
  .who-toggle { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 2px solid var(--border); background: none; cursor: pointer; transition: all .15s; }
  .who-toggle.on { border-color: currentColor; }
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-green { background: var(--accent); color: #fff; }
  .btn-purple { background: #7c3aed; color: #fff; }

  /* Day sections */
  .day-section { margin-bottom: 24px; }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; position: sticky; top: 112px; background: var(--bg); padding: 8px 0 4px; z-index: 10; }
  .day-title { font-size: 15px; font-weight: 700; }
  .day-progress { font-size: 11px; color: var(--muted); }
  .day-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
  .day-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

  /* Timeline grid */
  .timeline { position: relative; margin-left: 40px; border-left: 1px solid var(--border); }
  .hour-row { height: var(--hour-h); border-bottom: 1px solid var(--border); position: relative; }
  .hour-row:last-child { border-bottom: none; }
  .hour-label { position: absolute; left: -40px; top: -8px; width: 36px; text-align: right; font-size: 10px; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .hour-row.drop-highlight { background: rgba(45,106,79,.06); }

  /* Task blocks */
  .task-block { position: absolute; left: 4px; right: 4px; border-radius: 8px; padding: 6px 8px; overflow: hidden; cursor: grab; user-select: none; -webkit-user-select: none; border: 1px solid transparent; transition: box-shadow .15s; z-index: 2; display: flex; flex-direction: column; }
  .task-block:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); z-index: 3; }
  .task-block:active { cursor: grabbing; }
  .task-block.done { opacity: .45; }
  .task-block.done .task-block-text { text-decoration: line-through; }
  .task-block.dragging { opacity: .3; z-index: 1; }
  .task-block.completing { animation: pop .45s ease; }
  @keyframes pop { 0%{transform:scale(1)} 35%{transform:scale(1.03)} 70%{transform:scale(.99)} 100%{transform:scale(1)} }

  .task-block-top { display: flex; align-items: flex-start; gap: 6px; }
  .task-block-text { font-size: 12px; line-height: 1.3; flex: 1; min-width: 0; }
  .task-block-time { font-size: 10px; color: inherit; opacity: .7; white-space: nowrap; flex-shrink: 0; }
  .task-block-meta { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; align-items: center; }
  .task-block .who-pill { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 20px; }
  .task-block-actions { display: flex; gap: 2px; margin-left: auto; flex-shrink: 0; }
  .task-block-actions button { background: none; border: none; cursor: pointer; padding: 1px 3px; opacity: .5; transition: opacity .15s; color: inherit; }
  .task-block-actions button:hover { opacity: 1; }
  .task-block-actions .del-btn { font-size: 14px; }
  .task-block-actions .check-icon { width: 14px; height: 14px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; }
  .task-block-actions .check-icon.checked { background: currentColor; }
  .task-block-actions .check-icon svg { width: 8px; height: 8px; fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; display: none; }
  .task-block-actions .check-icon.checked svg { display: block; }

  /* Resize handle */
  .resize-handle { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; display: flex; align-items: center; justify-content: center; }
  .resize-handle::after { content: ''; width: 24px; height: 3px; border-radius: 2px; background: currentColor; opacity: .25; }
  .resize-handle:hover::after { opacity: .5; }

  /* Edit overlay */
  .edit-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .edit-overlay.open { display: flex; }
  .edit-panel { background: var(--card); border-radius: var(--radius); padding: 20px; width: 90%; max-width: 400px; }
  .edit-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .edit-panel label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 10px; }
  .edit-panel input, .edit-panel select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
  .edit-panel input:focus, .edit-panel select:focus { border-color: var(--accent); }
  .edit-panel .who-toggles { margin-top: 4px; }
  .edit-panel .edit-actions { display: flex; gap: 8px; margin-top: 16px; }
  .edit-panel .edit-actions button { flex: 1; }

  .day-section.drag-over-day { outline: 2px dashed var(--accent); outline-offset: 4px; border-radius: 8px; }

  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; border-radius: 2px; animation: cffall 1.3s ease-in forwards; }
  @keyframes cffall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(540deg);opacity:0} }

  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }

  @media (max-width: 480px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 15px; }
    .drag-bar { top: 62px; }
    .day-header { top: 98px; }
    .container { padding: 12px 8px 80px; }
    .quick-form { padding: 10px; }
    .form-row { gap: 5px; }
    .form-row input { min-width: 100%; font-size: 16px; padding: 10px 11px; }
    .form-row select { font-size: 14px; padding: 10px 9px; flex: 1; }
    .btn { padding: 10px 14px; font-size: 13px; width: 100%; }
    .timeline { margin-left: 32px; }
    .hour-label { left: -32px; width: 28px; font-size: 9px; }
    .task-block { left: 2px; right: 2px; padding: 5px 6px; }
    .task-block-text { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="confetti-wrap" id="confetti"></div>

<header>
  <div class="header-top">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
    <div><h1>Renovierung Heller</h1><p id="progress-text">Wird geladen...</p></div>
  </div>
  <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
</header>

<div class="drag-bar">
  <span class="drag-bar-label">Ziehen:</span>
  <span class="drag-name" draggable="true" data-name="Jonas" style="background:#dbeafe;color:#1d4ed8">Jonas</span>
  <span class="drag-name" draggable="true" data-name="Ralf" style="background:#dcfce7;color:#166534">Ralf</span>
  <span class="drag-name" draggable="true" data-name="Marlies" style="background:#fef9c3;color:#854d0e">Marlies</span>
  <span class="drag-name" draggable="true" data-name="Lili" style="background:#ede9fe;color:#5b21b6">Lili</span>
</div>

<div class="container">
  <div class="quick-form">
    <h2>Kinder betreuen — Tagesdienst</h2>
    <div class="form-row">
      <select id="kinder-day"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select>
      <select id="kinder-who"><option>Lili</option><option>Jonas</option><option>Ralf</option><option>Marlies</option><option>Alle</option></select>
      <button class="btn btn-purple" onclick="addKinder()">+ Eintragen</button>
    </div>
  </div>

  <div class="quick-form" style="margin-bottom:20px;">
    <h2>Aufgabe hinzufügen</h2>
    <div class="form-row">
      <input type="text" id="task-input" placeholder="Neue Aufgabe..." maxlength="120">
      <select id="day-select"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select>
      <select id="hour-select"></select>
      <select id="duration-select"></select>
      <div class="who-toggles" id="who-toggles"></div>
      <button class="btn btn-green" onclick="addTodo()">+ Hinzufügen</button>
    </div>
  </div>

  <div id="todo-list"><div class="loading">Verbinde...</div></div>
</div>

<!-- Edit modal -->
<div class="edit-overlay" id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-panel">
    <h3>Aufgabe bearbeiten</h3>
    <label>Aufgabe</label>
    <input type="text" id="edit-text" maxlength="120">
    <label>Tag</label>
    <select id="edit-day"></select>
    <div style="display:flex;gap:8px;">
      <div style="flex:1"><label>Uhrzeit</label><select id="edit-hour" style="width:100%"></select></div>
      <div style="flex:1"><label>Dauer</label><select id="edit-duration" style="width:100%"></select></div>
    </div>
    <label>Wer</label>
    <div class="who-toggles" id="edit-who"></div>
    <div class="edit-actions">
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="closeEdit()">Abbrechen</button>
      <button class="btn btn-green" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://mixaxkywkojoclgbjjur.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peGF4a3l3a29qb2NsZ2JqanVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MTA5ODEsImV4cCI6MjA4MjQ4Njk4MX0._rvGSaVi4VERdWbA-Z229rhe4KyJH2FU5pHqLkYjtc4';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const NAMES = ['Jonas','Ralf','Marlies','Lili'];
const WHO_COLORS = {
  Jonas:   { bg: '#dbeafe', color: '#1d4ed8' },
  Ralf:    { bg: '#dcfce7', color: '#166534' },
  Marlies: { bg: '#fef9c3', color: '#854d0e' },
  Lili:    { bg: '#ede9fe', color: '#5b21b6' },
  Alle:    { bg: '#fce7f3', color: '#9d174d' }
};
const HOUR_H = 56;
const WEEKDAY_EVENING = ['Montag','Dienstag','Mittwoch','Donnerstag'];
function dayHours(day) {
  if (WEEKDAY_EVENING.includes(day)) return { start: 18, end: 21 };
  return { start: 7, end: 21 };
}

let todos = [];
let editId = null;

// Populate selects
const hourSel = document.getElementById('hour-select');
const durSel = document.getElementById('duration-select');
function populateHourSelect(sel, hStart, hEnd, selected) {
  sel.innerHTML = '';
  for (let h = hStart; h < hEnd; h++) {
    sel.innerHTML += `<option value="${h}"${h == selected ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`;
  }
}
function updateAddFormHours() {
  const day = document.getElementById('day-select').value;
  const { start, end } = dayHours(day);
  populateHourSelect(hourSel, start, end, start);
  durSel.innerHTML = '';
  for (let d = 1; d <= (end - start); d++) {
    durSel.innerHTML += `<option value="${d}">${d}h</option>`;
  }
}
document.getElementById('day-select').addEventListener('change', updateAddFormHours);
updateAddFormHours();

// Populate edit selects
const editDaySel = document.getElementById('edit-day');
DAYS.forEach(d => { editDaySel.innerHTML += `<option>${d}</option>`; });
const editHourSel = document.getElementById('edit-hour');
const editDurSel = document.getElementById('edit-duration');
function updateEditFormHours() {
  const day = editDaySel.value;
  const { start, end } = dayHours(day);
  const curHour = parseInt(editHourSel.value) || start;
  const curDur = parseInt(editDurSel.value) || 1;
  populateHourSelect(editHourSel, start, end, Math.max(start, Math.min(end - 1, curHour)));
  editDurSel.innerHTML = '';
  for (let d = 1; d <= (end - start); d++) {
    editDurSel.innerHTML += `<option value="${d}"${d == curDur ? ' selected' : ''}>${d}h</option>`;
  }
}
editDaySel.addEventListener('change', updateEditFormHours);
// Initial populate with full range (will be updated on edit open)
populateHourSelect(editHourSel, 7, 21, 8);
for (let d = 1; d <= 14; d++) {
  editDurSel.innerHTML += `<option value="${d}">${d}h</option>`;
}

// Who toggles for add form
document.getElementById('who-toggles').innerHTML = NAMES.map(n => {
  const wc = WHO_COLORS[n];
  return `<button type="button" class="who-toggle" style="color:${wc.color}" onclick="toggleAddWho('${n}')">${n}</button>`;
}).join('');

// Who toggles for edit form
document.getElementById('edit-who').innerHTML = NAMES.map(n => {
  const wc = WHO_COLORS[n];
  return `<button type="button" class="who-toggle" data-name="${n}" style="color:${wc.color}" onclick="toggleEditWho('${n}')">${n}</button>`;
}).join('');

async function loadTodos() {
  const { data, error } = await sb.from('reno_todos').select('*').order('start_hour').order('created_at');
  if (error) { document.getElementById('todo-list').innerHTML = '<div class="empty">Fehler: ' + esc(error.message) + '</div>'; return; }
  todos = data || [];
  renderList();
}
loadTodos();

sb.channel('reno_todos_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'reno_todos' }, () => { loadTodos(); })
  .subscribe();

function layoutColumns(items) {
  // Assign columns to overlapping tasks
  const sorted = [...items].sort((a, b) => (a.start_hour || 8) - (b.start_hour || 8));
  const cols = []; // each col = list of tasks with their end times
  const taskCols = new Map();
  const taskMaxCols = new Map();

  sorted.forEach(t => {
    const start = t.start_hour ?? 8;
    const end = start + (t.duration ?? 1);
    let placed = false;
    for (let c = 0; c < cols.length; c++) {
      if (cols[c] <= start) {
        cols[c] = end;
        taskCols.set(t.id, c);
        placed = true;
        break;
      }
    }
    if (!placed) {
      taskCols.set(t.id, cols.length);
      cols.push(end);
    }
  });

  // Calculate max overlapping columns for each task
  sorted.forEach(t => {
    const start = t.start_hour ?? 8;
    const end = start + (t.duration ?? 1);
    let maxC = 1;
    sorted.forEach(u => {
      const us = u.start_hour ?? 8;
      const ue = us + (u.duration ?? 1);
      if (us < end && ue > start) {
        maxC = Math.max(maxC, (taskCols.get(u.id) || 0) + 1);
      }
    });
    taskMaxCols.set(t.id, maxC);
  });

  return { taskCols, taskMaxCols };
}

function renderList() {
  const done = todos.filter(t => t.done).length;
  const pct = todos.length ? Math.round(done / todos.length * 100) : 0;
  document.getElementById('progress-text').textContent = `${done} von ${todos.length} erledigt (${pct}%)`;
  document.getElementById('overall-fill').style.width = pct + '%';

  const list = document.getElementById('todo-list');
  let html = '';

  DAYS.forEach(day => {
    const { start: hStart, end: hEnd } = dayHours(day);
    const totalHours = hEnd - hStart;
    const items = todos.filter(t => t.day === day);
    const dayDone = items.filter(t => t.done).length;
    const dayPct = items.length ? Math.round(dayDone / items.length * 100) : 0;
    const { taskCols, taskMaxCols } = layoutColumns(items);

    html += `<div class="day-section" data-day="${day}">
      <div class="day-header">
        <span class="day-title">${day}</span>
        <span class="day-progress">${dayDone}/${items.length}</span>
      </div>
      <div class="day-bar"><div class="day-bar-fill" style="width:${dayPct}%"></div></div>
      <div class="timeline" style="height:${totalHours * HOUR_H}px" data-day="${day}" data-hstart="${hStart}" data-hend="${hEnd}">`;

    for (let h = hStart; h < hEnd; h++) {
      html += `<div class="hour-row" data-hour="${h}"><span class="hour-label">${String(h).padStart(2, '0')}:00</span></div>`;
    }

    items.forEach(t => {
      const start = t.start_hour ?? 18;
      const dur = t.duration ?? 1;
      const top = (start - hStart) * HOUR_H;
      const height = dur * HOUR_H - 2;
      const people = t.who.split(',').map(s => s.trim()).filter(Boolean);
      const firstPerson = people[0] || 'Jonas';
      const wc = WHO_COLORS[firstPerson] || WHO_COLORS.Jonas;

      const col = taskCols.get(t.id) || 0;
      const maxCol = taskMaxCols.get(t.id) || 1;
      const widthPct = 100 / maxCol;
      const leftPct = col * widthPct;

      const pills = people.map(p => {
        const c = WHO_COLORS[p] || { bg: '#eee', color: '#555' };
        return `<span class="who-pill" style="background:${c.bg};color:${c.color}">${p}</span>`;
      }).join('');

      const endHour = Math.min(start + dur, hEnd);
      const timeLabel = `${String(start).padStart(2, '0')}–${String(endHour).padStart(2, '0')}`;

      html += `<div class="task-block${t.done ? ' done' : ''}" id="item-${t.id}" data-id="${t.id}"
        style="top:${top}px;height:${height}px;background:${wc.bg};color:${wc.color};border-color:${wc.color}40;left:calc(4px + ${leftPct}%*(1 - 8px/100%));width:calc(${widthPct}% - 8px);"
        draggable="true">
        <div class="task-block-top">
          <div class="task-block-text">${esc(t.text)}</div>
          <span class="task-block-time">${timeLabel}</span>
        </div>
        <div class="task-block-meta">
          ${pills}
          <span class="task-block-actions">
            <button onclick="event.stopPropagation();toggle('${t.id}',${t.done})" title="${t.done ? 'Rückgängig' : 'Erledigt'}">
              <div class="check-icon${t.done ? ' checked' : ''}"><svg viewBox="0 0 10 10"><polyline points="1,5.5 3.8,8.5 9,1.5"/></svg></div>
            </button>
            <button onclick="event.stopPropagation();openEdit('${t.id}')" title="Bearbeiten">✎</button>
            <button class="del-btn" onclick="event.stopPropagation();delTodo('${t.id}')" title="Löschen">&times;</button>
          </span>
        </div>
        <div class="resize-handle" data-id="${t.id}"></div>
      </div>`;
    });

    html += '</div></div>';
  });

  list.innerHTML = html;
  setupInteractions();
}

// --- CRUD ---
window.toggle = async function(id, wasDone) {
  if (!wasDone) {
    const el = document.getElementById('item-' + id);
    if (el) { el.classList.add('completing'); setTimeout(() => el.classList.remove('completing'), 500); }
    confetti();
  }
  await sb.from('reno_todos').update({ done: !wasDone }).eq('id', id);
  await loadTodos();
};

window.delTodo = async function(id) {
  if (!confirm('Aufgabe löschen?')) return;
  await sb.from('reno_todos').delete().eq('id', id);
  await loadTodos();
};

window.openEdit = function(id) {
  editId = id;
  const t = todos.find(x => x.id == id);
  if (!t) return;
  document.getElementById('edit-text').value = t.text;
  document.getElementById('edit-day').value = t.day;
  updateEditFormHours();
  document.getElementById('edit-hour').value = t.start_hour ?? dayHours(t.day).start;
  document.getElementById('edit-duration').value = t.duration ?? 1;
  const people = t.who.split(',').map(s => s.trim()).filter(Boolean);
  document.querySelectorAll('#edit-who .who-toggle').forEach(btn => {
    const name = btn.dataset.name;
    const wc = WHO_COLORS[name];
    if (people.includes(name)) {
      btn.classList.add('on');
      btn.style.background = wc.bg; btn.style.borderColor = wc.color;
    } else {
      btn.classList.remove('on');
      btn.style.background = 'none'; btn.style.borderColor = '';
    }
  });
  document.getElementById('edit-overlay').classList.add('open');
};

window.closeEdit = function() {
  editId = null;
  document.getElementById('edit-overlay').classList.remove('open');
};

window.toggleEditWho = function(name) {
  const btn = document.querySelector(`#edit-who .who-toggle[data-name="${name}"]`);
  if (!btn) return;
  btn.classList.toggle('on');
  const wc = WHO_COLORS[name];
  if (btn.classList.contains('on')) {
    btn.style.background = wc.bg; btn.style.borderColor = wc.color;
  } else {
    btn.style.background = 'none'; btn.style.borderColor = '';
  }
};

window.saveEdit = async function() {
  if (!editId) return;
  const text = document.getElementById('edit-text').value.trim();
  const day = document.getElementById('edit-day').value;
  const start_hour = parseInt(document.getElementById('edit-hour').value);
  const duration = parseInt(document.getElementById('edit-duration').value);
  const selected = [...document.querySelectorAll('#edit-who .who-toggle.on')].map(b => b.dataset.name);
  if (!text || !selected.length) return;
  await sb.from('reno_todos').update({ text, day, start_hour, duration, who: selected.join(',') }).eq('id', editId);
  closeEdit();
  await loadTodos();
};

window.toggleAddWho = function(name) {
  const container = document.getElementById('who-toggles');
  const btn = [...container.children].find(b => b.textContent === name);
  if (!btn) return;
  btn.classList.toggle('on');
  const wc = WHO_COLORS[name];
  if (btn.classList.contains('on')) {
    btn.style.background = wc.bg; btn.style.borderColor = wc.color;
  } else {
    btn.style.background = 'none'; btn.style.borderColor = '';
  }
};

window.addTodo = async function() {
  const text = document.getElementById('task-input').value.trim();
  const selected = [...document.getElementById('who-toggles').children].filter(b => b.classList.contains('on')).map(b => b.textContent);
  if (!text || !selected.length) return;
  const start_hour = parseInt(document.getElementById('hour-select').value);
  const duration = parseInt(document.getElementById('duration-select').value);
  await sb.from('reno_todos').insert({ text, day: document.getElementById('day-select').value, who: selected.join(','), done: false, start_hour, duration, created_at: Date.now() });
  document.getElementById('task-input').value = '';
  [...document.getElementById('who-toggles').children].forEach(b => { b.classList.remove('on'); b.style.background = 'none'; b.style.borderColor = ''; });
  await loadTodos();
};

window.addKinder = async function() {
  const kDay = document.getElementById('kinder-day').value;
  const { start, end } = dayHours(kDay);
  await sb.from('reno_todos').insert({ text: 'Kinder betreuen', day: kDay, who: document.getElementById('kinder-who').value, done: false, start_hour: start, duration: end - start, created_at: Date.now() });
  await loadTodos();
};

document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.addTodo(); });

// --- Interactions: resize, drag-move, name drops ---
function setupInteractions() {
  setupResize();
  setupTaskDrag();
  setupNameDrag();
}

function setupResize() {
  document.querySelectorAll('.resize-handle').forEach(handle => {
    let startY, startDur, taskId, timeline;

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      taskId = handle.dataset.id;
      const block = handle.parentElement;
      timeline = block.parentElement;
      startY = e.clientY;
      startDur = todos.find(t => t.id == taskId)?.duration ?? 1;

      const hEnd = parseInt(timeline.dataset.hend);
      const onMove = e2 => {
        const dy = e2.clientY - startY;
        const dHours = Math.round(dy / HOUR_H);
        const newDur = Math.max(1, Math.min(hEnd - (todos.find(t => t.id == taskId)?.start_hour ?? 18), startDur + dHours));
        block.style.height = (newDur * HOUR_H - 2) + 'px';
        const t = todos.find(t => t.id == taskId);
        const s = t?.start_hour ?? 18;
        const timeEl = block.querySelector('.task-block-time');
        if (timeEl) timeEl.textContent = `${String(s).padStart(2, '0')}–${String(Math.min(s + newDur, hEnd)).padStart(2, '0')}`;
        block._pendingDur = newDur;
      };
      const onUp = async () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (block._pendingDur && block._pendingDur !== startDur) {
          await sb.from('reno_todos').update({ duration: block._pendingDur }).eq('id', taskId);
          await loadTodos();
        }
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Touch resize
    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      taskId = handle.dataset.id;
      const block = handle.parentElement;
      const tlEl = block.parentElement;
      const thEnd = parseInt(tlEl.dataset.hend);
      startY = e.touches[0].clientY;
      startDur = todos.find(t => t.id == taskId)?.duration ?? 1;

      const onMove = e2 => {
        e2.preventDefault();
        const dy = e2.touches[0].clientY - startY;
        const dHours = Math.round(dy / HOUR_H);
        const newDur = Math.max(1, Math.min(thEnd - (todos.find(t => t.id == taskId)?.start_hour ?? 18), startDur + dHours));
        block.style.height = (newDur * HOUR_H - 2) + 'px';
        const t = todos.find(t => t.id == taskId);
        const s = t?.start_hour ?? 18;
        const timeEl = block.querySelector('.task-block-time');
        if (timeEl) timeEl.textContent = `${String(s).padStart(2, '0')}–${String(Math.min(s + newDur, thEnd)).padStart(2, '0')}`;
        block._pendingDur = newDur;
      };
      const onEnd = async () => {
        handle.removeEventListener('touchmove', onMove);
        handle.removeEventListener('touchend', onEnd);
        if (block._pendingDur && block._pendingDur !== startDur) {
          await sb.from('reno_todos').update({ duration: block._pendingDur }).eq('id', taskId);
          await loadTodos();
        }
      };
      handle.addEventListener('touchmove', onMove, { passive: false });
      handle.addEventListener('touchend', onEnd);
    }, { passive: true });
  });
}

function setupTaskDrag() {
  document.querySelectorAll('.task-block[draggable="true"]').forEach(block => {
    block.addEventListener('dragstart', e => {
      if (e.target.closest('.resize-handle')) { e.preventDefault(); return; }
      e.dataTransfer.setData('text/drag-task', block.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      block.classList.add('dragging');
    });
    block.addEventListener('dragend', () => block.classList.remove('dragging'));
  });

  // Timelines accept task drops
  document.querySelectorAll('.timeline').forEach(tl => {
    const tlStart = parseInt(tl.dataset.hstart);
    const tlEnd = parseInt(tl.dataset.hend);
    tl.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('text/drag-task')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      tl.querySelectorAll('.hour-row.drop-highlight').forEach(r => r.classList.remove('drop-highlight'));
      const rect = tl.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const hour = Math.floor(y / HOUR_H) + tlStart;
      const row = tl.querySelector(`.hour-row[data-hour="${hour}"]`);
      if (row) row.classList.add('drop-highlight');
    });
    tl.addEventListener('dragleave', e => {
      if (!tl.contains(e.relatedTarget)) {
        tl.querySelectorAll('.hour-row.drop-highlight').forEach(r => r.classList.remove('drop-highlight'));
      }
    });
    tl.addEventListener('drop', async e => {
      tl.querySelectorAll('.hour-row.drop-highlight').forEach(r => r.classList.remove('drop-highlight'));
      const taskId = e.dataTransfer.getData('text/drag-task');
      if (!taskId) return;
      e.preventDefault();
      const rect = tl.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const hour = Math.max(tlStart, Math.min(tlEnd - 1, Math.floor(y / HOUR_H) + tlStart));
      const targetDay = tl.dataset.day;
      const todo = todos.find(t => t.id == taskId);
      if (!todo) return;
      const dur = todo.duration ?? 1;
      const clampedDur = Math.min(dur, tlEnd - hour);
      const updates = { start_hour: hour, duration: clampedDur };
      if (todo.day !== targetDay) updates.day = targetDay;
      await sb.from('reno_todos').update(updates).eq('id', taskId);
      await loadTodos();
    });
  });

  // Touch drag for tasks
  document.querySelectorAll('.task-block[draggable="true"]').forEach(block => {
    let clone = null, dragging = false, startY = 0, startX = 0;
    block.addEventListener('touchstart', e => {
      if (e.target.closest('.resize-handle')) return;
      startY = e.touches[0].clientY;
      startX = e.touches[0].clientX;
      dragging = false;
    }, { passive: true });
    block.addEventListener('touchmove', e => {
      if (e.target.closest('.resize-handle')) return;
      const t = e.touches[0];
      if (!dragging && (Math.abs(t.clientY - startY) > 12 || Math.abs(t.clientX - startX) > 12)) {
        dragging = true;
        clone = document.createElement('div');
        clone.textContent = block.querySelector('.task-block-text').textContent.substring(0, 25) + '…';
        clone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:6px 12px;font-size:12px;opacity:.9;max-width:180px;';
        document.body.appendChild(clone);
        block.classList.add('dragging');
      }
      if (!dragging) return;
      e.preventDefault();
      clone.style.left = (t.clientX - 30) + 'px';
      clone.style.top = (t.clientY - 20) + 'px';
    }, { passive: false });
    block.addEventListener('touchend', async e => {
      if (!dragging) return;
      block.classList.remove('dragging');
      if (clone) { clone.remove(); clone = null; }
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const tl = target?.closest?.('.timeline');
      if (tl) {
        const rect = tl.getBoundingClientRect();
        const y = t.clientY - rect.top;
        const tStart = parseInt(tl.dataset.hstart);
        const tEnd = parseInt(tl.dataset.hend);
        const hour = Math.max(tStart, Math.min(tEnd - 1, Math.floor(y / HOUR_H) + tStart));
        const targetDay = tl.dataset.day;
        const todo = todos.find(td => td.id == block.dataset.id);
        if (todo) {
          const dur = todo.duration ?? 1;
          const clampedDur = Math.min(dur, tEnd - hour);
          const updates = { start_hour: hour, duration: clampedDur };
          if (todo.day !== targetDay) updates.day = targetDay;
          await sb.from('reno_todos').update(updates).eq('id', block.dataset.id);
          await loadTodos();
        }
      }
      dragging = false;
    });
  });
}

function setupNameDrag() {
  // Desktop: drag name pills
  document.querySelectorAll('.drag-name').forEach(pill => {
    pill.ondragstart = e => {
      e.dataTransfer.setData('text/drag-name', pill.dataset.name);
      e.dataTransfer.effectAllowed = 'copy';
    };
  });

  // Task blocks accept name drops
  document.querySelectorAll('.task-block').forEach(block => {
    block.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('text/drag-name')) {
        e.preventDefault();
        e.stopPropagation();
        e.dataTransfer.dropEffect = 'copy';
        block.style.boxShadow = '0 0 0 2px var(--accent)';
      }
    });
    block.addEventListener('dragleave', () => { block.style.boxShadow = ''; });
    block.addEventListener('drop', async e => {
      block.style.boxShadow = '';
      const name = e.dataTransfer.getData('text/drag-name');
      if (!name) return;
      e.preventDefault();
      e.stopPropagation();
      await assignNameToTask(block.dataset.id, name);
    });
  });

  // Touch: drag names onto task blocks
  document.querySelectorAll('.drag-name').forEach(pill => {
    let clone = null;
    pill.addEventListener('touchstart', e => {
      const t = e.touches[0];
      clone = pill.cloneNode(true);
      clone.style.cssText = `position:fixed;z-index:999;pointer-events:none;opacity:.85;left:${t.clientX - 20}px;top:${t.clientY - 20}px;`;
      document.body.appendChild(clone);
      pill._dragName = pill.dataset.name;
    }, { passive: true });
    pill.addEventListener('touchmove', e => {
      if (!clone) return;
      e.preventDefault();
      const t = e.touches[0];
      clone.style.left = (t.clientX - 20) + 'px';
      clone.style.top = (t.clientY - 20) + 'px';
      document.querySelectorAll('.task-block').forEach(b => b.style.boxShadow = '');
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const b = target?.closest?.('.task-block');
      if (b) b.style.boxShadow = '0 0 0 2px var(--accent)';
    }, { passive: false });
    pill.addEventListener('touchend', e => {
      if (clone) { clone.remove(); clone = null; }
      const t = e.changedTouches[0];
      document.querySelectorAll('.task-block').forEach(b => b.style.boxShadow = '');
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const b = target?.closest?.('.task-block');
      if (b) assignNameToTask(b.dataset.id, pill._dragName);
    });
  });
}

async function assignNameToTask(id, name) {
  const todo = todos.find(t => t.id == id);
  if (!todo) return;
  const people = todo.who.split(',').map(s => s.trim()).filter(Boolean);
  if (people.includes(name)) return;
  people.push(name);
  await sb.from('reno_todos').update({ who: people.join(',') }).eq('id', id);
  await loadTodos();
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function confetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#2d6a4f', '#52b788', '#d8f3dc', '#f4a261', '#e76f51', '#7c3aed'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const s = 6 + Math.random() * 7;
    el.style.cssText = `left:${Math.random() * 100}%;top:-10px;background:${colors[Math.floor(Math.random() * colors.length)]};width:${s}px;height:${s}px;animation-delay:${Math.random() * .4}s;animation-duration:${.9 + Math.random() * .7}s;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}
