<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reno Heller</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #888;
    --accent: #2d6a4f;
    --danger: #c0392b;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .logo { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .overall-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .overall-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }

  .drag-bar { display: flex; gap: 6px; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); align-items: center; position: sticky; top: 76px; z-index: 9; }
  .drag-bar-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; }
  .drag-name { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none; }
  .drag-name:active { cursor: grabbing; }

  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  .quick-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .quick-form h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
  .form-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .form-row input { flex: 1; min-width: 140px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 11px; font-size: 13px; color: var(--text); background: var(--bg); outline: none; }
  .form-row input:focus { border-color: var(--accent); }
  .form-row select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 9px; font-size: 12px; color: var(--text); background: var(--bg); outline: none; }
  .who-toggles { display: flex; gap: 4px; flex-wrap: wrap; }
  .who-toggle { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 2px solid var(--border); background: none; cursor: pointer; transition: all .15s; }
  .who-toggle.on { border-color: currentColor; }
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-green { background: var(--accent); color: #fff; }
  .btn-purple { background: #7c3aed; color: #fff; }

  .day-section { margin-bottom: 20px; }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; position: sticky; top: 112px; background: var(--bg); padding: 8px 0 4px; z-index: 5; }
  .day-title { font-size: 15px; font-weight: 700; }
  .day-progress { font-size: 11px; color: var(--muted); }
  .day-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .day-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
  .day-empty { text-align: center; padding: 16px; color: var(--muted); font-size: 12px; font-style: italic; }

  .todo-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; margin-bottom: 5px; display: flex; align-items: flex-start; gap: 10px; }
  .todo-item.done { opacity: .5; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
  .todo-item.completing { animation: pop .45s ease; }
  @keyframes pop { 0%{transform:scale(1)} 35%{transform:scale(1.03);background:#f0fff4} 70%{transform:scale(.99)} 100%{transform:scale(1)} }

  .check-btn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .check-btn:hover { border-color: var(--accent); }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); }
  .check-btn svg { width: 10px; height: 10px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; display: none; }
  .check-btn.checked svg { display: block; }

  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 13px; line-height: 1.4; }
  .todo-meta { margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .who-pill { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 20px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--border); font-size: 15px; padding: 2px 4px; transition: color .15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--danger); }
  .edit-btn { background: none; border: none; cursor: pointer; color: var(--border); padding: 2px 4px; transition: color .15s; flex-shrink: 0; display: flex; align-items: center; }
  .edit-btn:hover { color: var(--accent); }
  .edit-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .edit-row { display: none; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .edit-row.open { display: flex; }
  .edit-row input { flex: 1; min-width: 120px; border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; font-size: 12px; color: var(--text); background: var(--bg); outline: none; }
  .edit-row input:focus { border-color: var(--accent); }
  .edit-row select { border: 1px solid var(--border); border-radius: 7px; padding: 6px 8px; font-size: 11px; color: var(--text); background: var(--bg); outline: none; }
  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .cancel-btn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--muted); }

  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 13px; }

  .todo-item[draggable="true"] { cursor: grab; }
  .todo-item[draggable="true"]:active { cursor: grabbing; }
  .todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,106,79,.2); }
  .todo-item.dragging { opacity: .4; }
  .day-section.drag-over-day { background: rgba(45,106,79,.05); border-radius: var(--radius); }

  .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; border-radius: 2px; animation: cffall 1.3s ease-in forwards; }
  @keyframes cffall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(540deg);opacity:0} }

  /* Mobile */
  @media (max-width: 480px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 15px; }
    .drag-bar { top: 62px; }
    .day-header { top: 98px; }
    .container { padding: 14px 10px 80px; }
    .quick-form { padding: 10px; }
    .form-row { gap: 5px; }
    .form-row input { min-width: 100%; font-size: 16px; padding: 10px 11px; }
    .form-row select { font-size: 14px; padding: 10px 9px; flex: 1; }
    .btn { padding: 10px 14px; font-size: 13px; width: 100%; }
    .todo-item { padding: 12px 10px; gap: 8px; }
    .check-btn { width: 24px; height: 24px; }
    .check-btn svg { width: 12px; height: 12px; }
    .todo-text { font-size: 14px; }
    .who-pill { font-size: 11px; padding: 2px 8px; }
    .del-btn { font-size: 18px; padding: 4px 6px; }
    .edit-btn svg { width: 15px; height: 15px; }
    .edit-row input { min-width: 100%; font-size: 16px; }
    .edit-row select { font-size: 14px; flex: 1; }
    .save-btn, .cancel-btn { padding: 8px 14px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="confetti-wrap" id="confetti"></div>

<header>
  <div class="header-top">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
    <div><h1>Renovierung Heller</h1><p id="progress-text">Wird geladen...</p></div>
  </div>
  <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
</header>

<div class="drag-bar">
  <span class="drag-bar-label">Ziehen:</span>
  <span class="drag-name" draggable="true" data-name="Jonas" style="background:#dbeafe;color:#1d4ed8">Jonas</span>
  <span class="drag-name" draggable="true" data-name="Ralf" style="background:#dcfce7;color:#166534">Ralf</span>
  <span class="drag-name" draggable="true" data-name="Marlies" style="background:#fef9c3;color:#854d0e">Marlies</span>
  <span class="drag-name" draggable="true" data-name="Lili" style="background:#ede9fe;color:#5b21b6">Lili</span>
</div>

<div class="container">
  <div class="quick-form">
    <h2>Kinder betreuen — Tagesdienst</h2>
    <div class="form-row">
      <select id="kinder-day"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select>
      <select id="kinder-who"><option>Lili</option><option>Jonas</option><option>Ralf</option><option>Marlies</option><option>Alle</option></select>
      <button class="btn btn-purple" onclick="addKinder()">+ Eintragen</button>
    </div>
  </div>

  <div class="quick-form" style="margin-bottom:20px;">
    <h2>Aufgabe hinzufügen</h2>
    <div class="form-row">
      <input type="text" id="task-input" placeholder="Neue Aufgabe..." maxlength="120">
      <select id="day-select"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select>
      <div class="who-toggles" id="who-toggles"></div>
      <button class="btn btn-green" onclick="addTodo()">+ Hinzufügen</button>
    </div>
  </div>

  <div id="todo-list"><div class="loading">Verbinde...</div></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://mixaxkywkojoclgbjjur.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peGF4a3l3a29qb2NsZ2JqanVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5MTA5ODEsImV4cCI6MjA4MjQ4Njk4MX0._rvGSaVi4VERdWbA-Z229rhe4KyJH2FU5pHqLkYjtc4';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const NAMES = ['Jonas','Ralf','Marlies','Lili'];
const WHO_COLORS = {
  Jonas:   { bg: '#dbeafe', color: '#1d4ed8' },
  Ralf:    { bg: '#dcfce7', color: '#166534' },
  Marlies: { bg: '#fef9c3', color: '#854d0e' },
  Lili:    { bg: '#ede9fe', color: '#5b21b6' },
  Alle:    { bg: '#fce7f3', color: '#9d174d' }
};

const SEED = [
  { day:'Montag',     who:'Jonas',   text:'Alle Materialien auspacken und sortieren (Farben, Vlies, Kleister, Heizkörper)',  done:true  },
  { day:'Montag',     who:'Jonas',   text:'Alle Holzfenster mit 120er Schleifpapier anschleifen',                            done:false },
  { day:'Montag',     who:'Lili',    text:'Kinder betreuen',                                                                  done:false },
  { day:'Dienstag',   who:'Jonas',   text:'Erster Anstrich weißer Holzlack auf alle Fenster',                                done:false },
  { day:'Dienstag',   who:'Jonas',   text:'Schlafzimmerboden mit Abdeckfolie schützen',                                      done:false },
  { day:'Dienstag',   who:'Lili',    text:'Kinder betreuen',                                                                  done:false },
  { day:'Mittwoch',   who:'Jonas',   text:'Zweiter Anstrich Holzlack auf Fenster (Fenster danach fertig)',                   done:false },
  { day:'Mittwoch',   who:'Jonas',   text:'Schlafzimmerdecke streichen — 1 Anstrich Alpina Weiß',                           done:false },
  { day:'Mittwoch',   who:'Lili',    text:'Kinder betreuen',                                                                  done:false },
  { day:'Donnerstag', who:'Jonas',   text:'Schlafzimmerdecke kontrollieren — 2. Anstrich falls fleckig',                    done:false },
  { day:'Donnerstag', who:'Jonas',   text:'Esszimmerdecke streichen — 1 Anstrich Alpina Weiß',                              done:false },
  { day:'Donnerstag', who:'Jonas',   text:'Brombeere-Eimer prüfen — mindestens 4,4 L vorhanden?',                           done:false },
  { day:'Donnerstag', who:'Lili',    text:'Kinder betreuen',                                                                  done:false },
  { day:'Freitag',    who:'Ralf',    text:'Schornsteinfugen prüfen — schleifen + dünne Egalineschicht falls nötig',         done:false },
  { day:'Freitag',    who:'Ralf',    text:'Bodendielen mit MS-Polymer-Kleber verkleben (Zahnspachtel, 24h beschweren)',      done:false },
  { day:'Freitag',    who:'Jonas',   text:'Vlies an allen 4 Schlafzimmerwänden anbringen (mit Ralf ab 9 Uhr)',               done:false },
  { day:'Freitag',    who:'Marlies', text:'Kommt 14:00 — restliche Vlieswände helfen fertigstellen',                        done:false },
  { day:'Freitag',    who:'Lili',    text:'Kinder betreuen (ganzer Tag)',                                                     done:false },
  { day:'Samstag',    who:'Alle',    text:'1. Anstrich Schlafzimmer — Sand (Wände 1–3) + Brombeere (Wand 4)',               done:false },
  { day:'Samstag',    who:'Alle',    text:'2. Anstrich Schlafzimmer nach 2–3h — ggf. 3. Anstrich Brombeere',               done:false },
  { day:'Samstag',    who:'Jonas',   text:'Vlies Esszimmer beginnen während Wände trocknen',                                 done:false },
  { day:'Samstag',    who:'Ralf',    text:'Bodendielen kontrollieren — Tape entfernen, Haftung prüfen',                     done:false },
  { day:'Samstag',    who:'Alle',    text:'Bett zurück ins Schlafzimmer bringen',                                            done:false },
  { day:'Samstag',    who:'Lili',    text:'Kinder betreuen (ganzer Tag)',                                                     done:false },
  { day:'Sonntag',    who:'Jonas',   text:'Esszimmer-Vlies fertigstellen (falls Samstag nicht abgeschlossen)',               done:false },
  { day:'Sonntag',    who:'Jonas',   text:'Esszimmer streichen — 2× Sand + 2× Pistazie (verschiedene Wände gleichzeitig)', done:false },
  { day:'Sonntag',    who:'Marlies', text:'Esszimmer streichen parallel (Pistazie-Wand)',                                    done:false },
  { day:'Sonntag',    who:'Jonas',   text:'Büro-Akzentwand — Vlies anbringen + 2× Weiß streichen',                         done:false },
  { day:'Sonntag',    who:'Marlies', text:'Büro-Akzentwand mithelfen',                                                       done:false },
];

let todos = [];

async function loadTodos() {
  const { data, error } = await sb.from('reno_todos').select('*').order('created_at');
  if (error) { document.getElementById('todo-list').innerHTML = '<div class="empty">Fehler: ' + esc(error.message) + '</div>'; return; }
  if (!data.length) {
    const rows = SEED.map((t, i) => ({ ...t, created_at: Date.now() + i }));
    const { data: seeded } = await sb.from('reno_todos').insert(rows).select();
    todos = seeded || [];
  } else {
    todos = data;
  }
  renderList();
}
loadTodos();

// Realtime sync
sb.channel('reno_todos_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'reno_todos' }, () => {
    loadTodos();
  })
  .subscribe();

function renderList() {
  const done = todos.filter(t => t.done).length;
  const pct = todos.length ? Math.round(done/todos.length*100) : 0;
  document.getElementById('progress-text').textContent = `${done} von ${todos.length} erledigt (${pct}%)`;
  document.getElementById('overall-fill').style.width = pct + '%';

  const list = document.getElementById('todo-list');
  let html = '';

  DAYS.forEach(day => {
    const items = todos.filter(t => t.day === day);
    const dayDone = items.filter(t => t.done).length;
    const dayPct = items.length ? Math.round(dayDone/items.length*100) : 0;

    html += `<div class="day-section" data-day="${day}">
      <div class="day-header">
        <span class="day-title">${day}</span>
        <span class="day-progress">${dayDone} von ${items.length}</span>
      </div>
      <div class="day-bar"><div class="day-bar-fill" style="width:${dayPct}%"></div></div>`;

    if (!items.length) {
      html += '<div class="day-empty">Keine Aufgaben</div>';
    } else {
      items.forEach(t => {
        const people = t.who.split(',').map(s => s.trim()).filter(Boolean);
        const pills = people.map(p => {
          const wc = WHO_COLORS[p] || { bg:'#eee', color:'#555' };
          return `<span class="who-pill" style="background:${wc.bg};color:${wc.color}">${p}</span>`;
        }).join('');
        const editToggles = NAMES.map(n => {
          const on = people.includes(n) ? ' on' : '';
          const wc = WHO_COLORS[n];
          const style = on ? `background:${wc.bg};color:${wc.color};border-color:${wc.color}` : `color:${wc.color}`;
          return `<button type="button" class="who-toggle${on}" style="${style}" onclick="toggleEditWho('${t.id}','${n}')">${n}</button>`;
        }).join('');
        html += `<div class="todo-item${t.done?' done':''}" id="item-${t.id}" draggable="true" data-id="${t.id}" data-day="${day}">
          <button class="check-btn${t.done?' checked':''}" onclick="toggle('${t.id}',${t.done})">
            <svg viewBox="0 0 10 10"><polyline points="1,5.5 3.8,8.5 9,1.5"/></svg>
          </button>
          <div class="todo-body">
            <div class="todo-text">${esc(t.text)}</div>
            <div class="todo-meta">${pills}</div>
            <div class="edit-row" id="edit-${t.id}">
              <input type="text" id="edit-text-${t.id}" value="${esc(t.text)}" maxlength="120">
              <div class="who-toggles" id="edit-who-${t.id}">${editToggles}</div>
              <button class="save-btn" onclick="saveEdit('${t.id}')">Speichern</button>
              <button class="cancel-btn" onclick="closeEdit('${t.id}')">Abbrechen</button>
            </div>
          </div>
          <button class="edit-btn" onclick="openEdit('${t.id}')" title="Bearbeiten">
            <svg viewBox="0 0 14 14"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/><path d="M8 4l2 2"/></svg>
          </button>
          <button class="del-btn" onclick="delTodo('${t.id}')">&times;</button>
        </div>`;
      });
    }
    html += '</div>';
  });

  list.innerHTML = html;
  setupDragDrop();
}

window.toggle = async function(id, wasDone) {
  if (!wasDone) {
    const el = document.getElementById('item-' + id);
    if (el) { el.classList.add('completing'); setTimeout(() => el.classList.remove('completing'), 500); }
    confetti();
  }
  await sb.from('reno_todos').update({ done: !wasDone }).eq('id', id);
  await loadTodos();
};
window.delTodo = async function(id) {
  if (!confirm('Aufgabe löschen?')) return;
  await sb.from('reno_todos').delete().eq('id', id);
  await loadTodos();
};
window.openEdit = function(id) {
  document.getElementById('edit-'+id).classList.add('open');
};
window.closeEdit = function(id) {
  document.getElementById('edit-'+id).classList.remove('open');
};
window.toggleEditWho = function(id, name) {
  const container = document.getElementById('edit-who-'+id);
  const btn = [...container.children].find(b => b.textContent === name);
  if (!btn) return;
  btn.classList.toggle('on');
  const wc = WHO_COLORS[name];
  if (btn.classList.contains('on')) {
    btn.style.background = wc.bg; btn.style.borderColor = wc.color;
  } else {
    btn.style.background = 'none'; btn.style.borderColor = '';
  }
};
window.saveEdit = async function(id) {
  const text = document.getElementById('edit-text-'+id).value.trim();
  const selected = [...document.getElementById('edit-who-'+id).children].filter(b => b.classList.contains('on')).map(b => b.textContent);
  if (!text || !selected.length) return;
  await sb.from('reno_todos').update({ text, who: selected.join(',') }).eq('id', id);
  await loadTodos();
};
window.toggleAddWho = function(name) {
  const container = document.getElementById('who-toggles');
  const btn = [...container.children].find(b => b.textContent === name);
  if (!btn) return;
  btn.classList.toggle('on');
  const wc = WHO_COLORS[name];
  if (btn.classList.contains('on')) {
    btn.style.background = wc.bg; btn.style.borderColor = wc.color;
  } else {
    btn.style.background = 'none'; btn.style.borderColor = '';
  }
};
window.addTodo = async function() {
  const text = document.getElementById('task-input').value.trim();
  const selected = [...document.getElementById('who-toggles').children].filter(b => b.classList.contains('on')).map(b => b.textContent);
  if (!text || !selected.length) return;
  await sb.from('reno_todos').insert({ text, day: document.getElementById('day-select').value, who: selected.join(','), done: false, created_at: Date.now() });
  document.getElementById('task-input').value = '';
  [...document.getElementById('who-toggles').children].forEach(b => { b.classList.remove('on'); b.style.background = 'none'; b.style.borderColor = ''; });
  await loadTodos();
};
window.addKinder = async function() {
  await sb.from('reno_todos').insert({ text: 'Kinder betreuen', day: document.getElementById('kinder-day').value, who: document.getElementById('kinder-who').value, done: false, created_at: Date.now() });
  await loadTodos();
};
document.getElementById('task-input').addEventListener('keydown', e => { if(e.key==='Enter') window.addTodo(); });

// Render add-form who toggles
document.getElementById('who-toggles').innerHTML = NAMES.map(n => {
  const wc = WHO_COLORS[n];
  return `<button type="button" class="who-toggle" style="color:${wc.color}" onclick="toggleAddWho('${n}')">${n}</button>`;
}).join('');

// --- Drag & Drop: Names onto tasks + Tasks between day sections ---
function setupDragDrop() {
  // Name pills → tasks (drag from bar)
  document.querySelectorAll('.drag-name').forEach(pill => {
    pill.ondragstart = e => {
      e.dataTransfer.setData('text/drag-name', pill.dataset.name);
      e.dataTransfer.effectAllowed = 'copy';
    };
  });

  // Task items: draggable + drop targets for names
  document.querySelectorAll('.todo-item[draggable="true"]').forEach(item => {
    item.addEventListener('dragstart', e => {
      if (e.dataTransfer.types.includes('text/drag-name')) return;
      e.dataTransfer.setData('text/drag-task', item.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));

    // Accept name drops
    item.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('text/drag-name')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        item.classList.add('drag-over');
      }
    });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', async e => {
      item.classList.remove('drag-over');
      const name = e.dataTransfer.getData('text/drag-name');
      if (name) {
        e.preventDefault();
        assignNameToTask(item.dataset.id, name);
      }
    });
  });

  // Day sections: accept task drops to move tasks between days
  document.querySelectorAll('.day-section').forEach(section => {
    section.addEventListener('dragover', e => {
      const hasTask = e.dataTransfer.types.includes('text/drag-task');
      if (!hasTask) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      // Clear others, highlight this section
      document.querySelectorAll('.day-section.drag-over-day').forEach(s => s.classList.remove('drag-over-day'));
      section.classList.add('drag-over-day');
    });
    section.addEventListener('dragleave', e => {
      // Only remove if leaving the section entirely
      if (!section.contains(e.relatedTarget)) {
        section.classList.remove('drag-over-day');
      }
    });
    section.addEventListener('drop', async e => {
      section.classList.remove('drag-over-day');
      const taskId = e.dataTransfer.getData('text/drag-task');
      if (!taskId) return;
      e.preventDefault();
      const targetDay = section.dataset.day;
      const todo = todos.find(t => t.id == taskId);
      if (!todo || todo.day === targetDay) return;
      await sb.from('reno_todos').update({ day: targetDay }).eq('id', taskId);
      await loadTodos();
    });
  });

  // Touch: drag names onto tasks
  setupNameTouchDrag();
  // Touch: drag tasks between day sections
  setupTaskTouchDrag();
}

function setupNameTouchDrag() {
  document.querySelectorAll('.drag-name').forEach(pill => {
    let clone = null;
    pill.addEventListener('touchstart', e => {
      const t = e.touches[0];
      clone = pill.cloneNode(true);
      clone.style.cssText = `position:fixed;z-index:999;pointer-events:none;opacity:.85;left:${t.clientX-20}px;top:${t.clientY-20}px;`;
      document.body.appendChild(clone);
      pill._dragName = pill.dataset.name;
    }, { passive: true });
    pill.addEventListener('touchmove', e => {
      if (!clone) return;
      e.preventDefault();
      const t = e.touches[0];
      clone.style.left = (t.clientX - 20) + 'px';
      clone.style.top = (t.clientY - 20) + 'px';
      document.querySelectorAll('.todo-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const item = target?.closest?.('.todo-item');
      if (item) item.classList.add('drag-over');
    }, { passive: false });
    pill.addEventListener('touchend', e => {
      if (clone) { clone.remove(); clone = null; }
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const item = target?.closest?.('.todo-item');
      document.querySelectorAll('.todo-item.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (item) assignNameToTask(item.dataset.id, pill._dragName);
    });
  });
}

function setupTaskTouchDrag() {
  document.querySelectorAll('.todo-item[draggable="true"]').forEach(item => {
    let clone = null, dragging = false, startY = 0;
    item.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      dragging = false;
    }, { passive: true });
    item.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (!dragging && Math.abs(t.clientY - startY) > 10) {
        dragging = true;
        clone = document.createElement('div');
        clone.textContent = item.querySelector('.todo-text').textContent.substring(0, 30) + '…';
        clone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:6px 12px;font-size:12px;opacity:.9;max-width:200px;';
        document.body.appendChild(clone);
      }
      if (!dragging) return;
      e.preventDefault();
      clone.style.left = (t.clientX - 30) + 'px';
      clone.style.top = (t.clientY - 20) + 'px';
      document.querySelectorAll('.day-section.drag-over-day').forEach(s => s.classList.remove('drag-over-day'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const section = target?.closest?.('.day-section');
      if (section) section.classList.add('drag-over-day');
    }, { passive: false });
    item.addEventListener('touchend', async e => {
      if (!dragging) return;
      if (clone) { clone.remove(); clone = null; }
      const t = e.changedTouches[0];
      document.querySelectorAll('.day-section.drag-over-day').forEach(s => s.classList.remove('drag-over-day'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const section = target?.closest?.('.day-section');
      if (section) {
        const targetDay = section.dataset.day;
        const todo = todos.find(td => td.id == item.dataset.id);
        if (todo && todo.day !== targetDay) {
          await sb.from('reno_todos').update({ day: targetDay }).eq('id', item.dataset.id);
          await loadTodos();
        }
      }
      dragging = false;
    });
  });
}

async function assignNameToTask(id, name) {
  const todo = todos.find(t => t.id == id);
  if (!todo) return;
  const people = todo.who.split(',').map(s => s.trim()).filter(Boolean);
  if (people.includes(name)) return;
  people.push(name);
  await sb.from('reno_todos').update({ who: people.join(',') }).eq('id', id);
  await loadTodos();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function confetti() {
  const wrap = document.getElementById('confetti');
  const colors = ['#2d6a4f','#52b788','#d8f3dc','#f4a261','#e76f51','#7c3aed'];
  for (let i=0; i<30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const s = 6+Math.random()*7;
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${s}px;height:${s}px;animation-delay:${Math.random()*.4}s;animation-duration:${.9+Math.random()*.7}s;`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}
